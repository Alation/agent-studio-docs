name: Link Checker

on:
    merge_group:
    pull_request:
    push:
        branches: [main]

jobs:
    check_links:
        name: Link Checking
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6.0.3
              with:
                  fetch-depth: 0

            - name: Install d2 with retry and exponential backoff
              run: |
                  max_attempts=3
                  for attempt in $(seq 1 "$max_attempts"); do
                    echo "Attempt $attempt of $max_attempts: Installing d2..."

                    if curl -fsSL https://d2lang.com/install.sh | sh -s --; then
                      echo "✅ d2 installed successfully."
                      exit 0
                    fi
                    if [ "$attempt" -lt "$max_attempts" ]; then
                      sleep_time=$((attempt * 5))
                      echo "❌ Install failed. Retrying in ${sleep_time}s..."
                      sleep "$sleep_time"
                    else
                      echo "🔥 d2 installation failed after $max_attempts attempts."
                      exit 1
                    fi
                  done

            - name: Install and build site
              uses: withastro/action@v6
              with:
                  path: .

            - name: Restore lychee cache
              id: restore-cache
              uses: actions/cache/restore@v5
              with:
                  path: .lycheecache
                  # `-N-` at the end of the prefix just useful for forcing a new cache
                  key: cache-lychee-0-${{ hashFiles('dist/**/*.html') }}
                  restore-keys: cache-lychee-0-

            - name: Run lychee
              uses: lycheeverse/lychee-action@v2
              with:
                  fail: true
                  # The first remap points the site's own absolute URLs (canonical/og tags
                  # and cross-page links) at the local build instead of the live site, so
                  # PRs that add or move pages don't fail on not-yet-deployed URLs.
                  args: --accept "100..=103,200..=299,403,418,429" --cache-exclude-status 401 --remap 'https://alation\.github\.io/agent-studio-docs file://${{ github.workspace }}/dist' --remap '/dist/agent-studio-docs /dist' --root-dir="${{ github.workspace }}/dist" --cache --max-cache-age 3d --exclude-path "dist/404.html" "dist/**/*.html"
                  jobSummary: true
                  format: markdown
                  workingDirectory: .

            - name: Save lychee cache
              uses: actions/cache/save@v5
              if: success()
              with:
                  path: .lycheecache
                  key: ${{ steps.restore-cache.outputs.cache-primary-key }}
